<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vakola Jumma Masjid - Digital Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #031c12;
            color: #ffffff;
            min-height: 100vh;
            width: 100vw;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .location {
            font-size: 1.3rem;
            color: #a3b899;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .welcome-banner {
            background-color: #0d422a;
            border: 1px solid #1c633f;
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
            max-width: 90%;
        }

        .welcome-banner span {
            color: #4ade80;
        }

        .settings-trigger {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.15;
            transition: opacity 0.3s;
        }
        .settings-trigger:hover {
            opacity: 0.8;
        }
        .settings-trigger svg {
            fill: #ffffff;
            width: 32px;
            height: 32px;
        }

        .hero-card {
            background: linear-gradient(145deg, #093b22, #062b19);
            border: 2px solid #144e31;
            border-radius: 40px;
            flex-grow: 1;
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0px 0px 30px rgba(0,0,0,0.4), 0px 20px 40px rgba(0,0,0,0.5);
            padding: 40px;
        }

        .next-jamat-tag {
            background-color: #17422f;
            border: 1px solid #235c42;
            padding: 12px 35px;
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .countdown-timer {
            font-size: 7.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .scheduled-time {
            font-size: 2rem;
            color: #a3c4b4;
            font-weight: 600;
        }

        .bottom-bar {
            background-color: #083821;
            border: 1px solid #124d30;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
            width: 100%;
            margin-top: 20px;
        }

        .bar-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            text-align: center;
        }

        .bar-segment:not(:last-child) {
            border-right: 1px solid #124d30;
        }

        .bar-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #5bb384;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .bar-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
        }

        .bar-highlight {
            font-size: 1.1rem;
            color: #eab308;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Admin Panels */
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(2, 14, 9, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .admin-box {
            background: #092e1b;
            border: 2px solid #1e5a38;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .admin-box h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e5a38;
            padding-bottom: 10px;
            color: #4ade80;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #a3c4b4;
        }

        .prayer-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }

        .prayer-row span {
            width: 80px;
            font-weight: 700;
        }

        .admin-box input[type="text"],
        .admin-box input[type="time"],
        .admin-box select {
            background: #04170e;
            border: 1px solid #1a472c;
            color: #ffffff;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
        }

        .prayer-row input[type="time"] {
            flex: 1;
        }

        .admin-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .btn-save {
            background: #4ade80;
            color: #031c12;
        }

        .btn-cancel {
            background: #334155;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Vakola Jumma Masjid</h1>
        <div class="location">Santacruz East, Mumbai</div>
        
        <div class="welcome-banner" id="banner-view">
            <span>WELCOME:</span> FRIDAY KHUTBAH BEGINS AT 1:15 PM.
        </div>

        <button class="settings-trigger" onclick="openAdminPanel()" aria-label="Open Settings">
            <svg viewBox="0 0 24 24">
                <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
            </svg>
        </button>
    </header>

    <!-- Main Dynamic View Card -->
    <main class="hero-card">
        <div class="next-jamat-tag" id="jamat-tag">NEXT JAMAT: LOADING</div>
        <div class="countdown-timer" id="countdown">00:00:00</div>
        <div class="scheduled-time" id="scheduled">Scheduled for --:-- --</div>
    </main>

    <!-- Simplified 2-Column Bottom Bar -->
    <footer class="bottom-bar">
        <!-- Column 1: Next Azan Time & Name -->
        <div class="bar-segment">
            <div class="bar-label">NEXT AZAN: <span style="color:#ffffff;" id="next-azan-time">--:-- --</span></div>
            <div class="bar-highlight" id="next-azan-name">LOADING</div>
        </div>
        
        <!-- Column 2: Fully Automated Hijri Date Display -->
        <div class="bar-segment">
            <div class="bar-label">HIJRI DATE</div>
            <div class="bar-value" id="hijri-date-view" style="color: #eab308; font-size: 1.5rem;">LOADING DATE</div>
        </div>
    </footer>

    <!-- Hidden Admin Settings Overlay -->
    <div class="admin-overlay" id="adminPanel">
        <div class="admin-box">
            <h2>Masjid Admin Control Panel</h2>
            
            <div class="form-group">
                <label for="inputNotice">Notice Banner Text</label>
                <input type="text" id="inputNotice" value="FRIDAY KHUTBAH BEGINS AT 1:15 PM.">
            </div>

            <div class="form-group">
                <label for="hijriOffset">Moon Sighting Adjustment (Hijri Offset)</label>
                <select id="hijriOffset">
                    <option value="-2">-2 Days</option>
                    <option value="-1">-1 Day</option>
                    <option value="0" selected>Standard (0 Days)</option>
                    <option value="1">+1 Day</option>
                    <option value="2">+2 Days</option>
                </select>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label style="color: #4ade80; border-bottom: 1px solid #1a472c; padding-bottom: 5px; margin-bottom: 10px;">Edit Namaz Schedules (24hr Format)</label>
                
                <div id="prayerFormRows">
                    <!-- Rows auto-inserted here -->
                </div>
            </div>

            <div class="admin-actions">
                <button class="btn btn-cancel" onclick="closeAdminPanel()">Cancel</button>
                <button class="btn btn-save" onclick="saveAdminSettings()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_NOTICE = "FRIDAY KHUTBAH BEGINS AT 1:15 PM.";
        
        const DEFAULT_SCHEDULE = [
            { name: 'Fajr',    azan: '04:40', jamat: '05:10' },
            { name: 'Zohr',    azan: '12:35', jamat: '13:00' }, 
            { name: 'Jummah',  azan: '12:35', jamat: '13:15' }, 
            { name: 'Asr',     azan: '17:05', jamat: '17:30' }, 
            { name: 'Maghrib', azan: '19:15', jamat: '19:20' }, 
            { name: 'Isha',    azan: '20:45', jamat: '21:00' }  
        ];
        
        const ADMIN_PIN = "1234"; 

        let currentNotice = localStorage.getItem('masjidNotice') || DEFAULT_NOTICE;
        let hijriOffset = parseInt(localStorage.getItem('masjidHijriOffset')) || 0;
        let completeSchedule = JSON.parse(localStorage.getItem('masjidSchedule')) || DEFAULT_SCHEDULE;

        document.getElementById('banner-view').innerHTML = `<span>WELCOME:</span> ${currentNotice}`;

        function format12Hour(timeString) {
            let [hrs, mins] = timeString.split(':').map(Number);
            let ampm = hrs >= 12 ? 'PM' : 'AM';
            hrs = hrs % 12 || 12;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')} ${ampm}`;
        }

        // Automated Mathematical Hijri Converter featuring customizable sunset check
        function getAutomatedHijriDate() {
            let dateObj = new Date();
            
            // 1. Locate Maghrib time from configuration array
            let maghribTime = "19:15"; 
            let maghribFind = completeSchedule.find(p => p.name.toLowerCase() === 'maghrib');
            if (maghribFind) maghribTime = maghribFind.azan;

            let [mHrs, mMins] = maghribTime.split(':').map(Number);
            let maghribClock = new Date();
            maghribClock.setHours(mHrs, mMins, 0, 0);

            // 2. Shift date immediately forward if current hour crossed local Maghrib Azan
            if (dateObj >= maghribClock) {
                dateObj.setDate(dateObj.getDate() + 1);
            }

            // 3. Apply manual administrative offset (Moon Sighting Adjustment)
            if (hijriOffset !== 0) {
                dateObj.setDate(dateObj.getDate() + hijriOffset);
            }

            // 4. Base tabular conversions
            let julianDay = Math.floor(dateObj.getTime() / 86400000) + 2440588;
            let l = julianDay - 1948440 + 10632;
            let n = Math.floor((l - 1) / 10631);
            l = l - 10631 * n + 354;
            let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor((l) / 5670)) * (Math.floor((43 * l) / 15238));
            l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor((j) / 16)) * (Math.floor((15238 * j) / 43)) + 29;
            
            let month = Math.floor((24 * l) / 709);
            let day = l - Math.floor((709 * month) / 24);
            let year = 30 * n + j - 30;

            const islamicMonths = [
                "MUHARRAM", "SAFAR", "RABI AL-AWWAL", "RABI AL-THANI",
                "JUMADA AL-AWWAL", "JUMADA AL-THANI", "RAJAB", "SHA'BAN",
                "RAMADAN", "SHAWWAL", "DHUL-QA'DA", "DHUL-HIJJAH"
            ];

            return `${day} ${islamicMonths[month - 1]} ${year}`;
        }

        function getActiveScheduleForToday() {
            const today = new Date();
            const isFriday = (today.getDay() === 5);

            return completeSchedule.filter(prayer => {
                if (prayer.name === 'Jummah' && !isFriday) return false;
                if (prayer.name === 'Zohr' && isFriday) return false;
                return true;
            });
        }

        function updateDisplay() {
            const now = new Date();
            let prayerSchedule = getActiveScheduleForToday();
            let nextPrayerIndex = -1;

            for (let i = 0; i < prayerSchedule.length; i++) {
                let [jamatHrs, jamatMins] = prayerSchedule[i].jamat.split(':').map(Number);
                let jamatTime = new Date();
                jamatTime.setHours(jamatHrs, jamatMins, 0, 0);

                if (now < jamatTime) {
                    nextPrayerIndex = i;
                    break;
                }
            }

            if (nextPrayerIndex === -1) nextPrayerIndex = 0;

            let nextPrayer = prayerSchedule[nextPrayerIndex];
            let [targetHrs, targetMins] = nextPrayer.jamat.split(':').map(Number);
            let targetDate = new Date();
            targetDate.setHours(targetHrs, targetMins, 0, 0);

            if (now > targetDate) {
                targetDate.setDate(targetDate.getDate() + 1);
            }

            let diffMs = targetDate - now;
            let diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
            let diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            let diffSecs = Math.floor((diffMs % (1000 * 60)) / 1000);

            document.getElementById('jamat-tag').innerText = `NEXT JAMAT: ${nextPrayer.name}`;
            document.getElementById('countdown').innerText = `${String(diffHrs).padStart(2, '0')}:${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
            document.getElementById('scheduled').innerText = `Scheduled for ${format12Hour(nextPrayer.jamat)}`;
            
            document.getElementById('next-azan-time').innerText = format12Hour(nextPrayer.azan);
            document.getElementById('next-azan-name').innerText = nextPrayer.name;

            // Automatically check and render current calculation on loop updates
            document.getElementById('hijri-date-view').innerText = getAutomatedHijriDate();
        }

        function openAdminPanel() {
            let userPin = prompt("Enter Admin Security PIN to access settings:");
            if (userPin === ADMIN_PIN) {
                document.getElementById('inputNotice').value = currentNotice;
                document.getElementById('hijriOffset').value = hijriOffset;
                
                let container = document.getElementById('prayerFormRows');
                container.innerHTML = ""; 
                
                completeSchedule.forEach((p, idx) => {
                    container.innerHTML += `
                        <div class="prayer-row" data-idx="${idx}">
                            <span>${p.name}</span>
                            <label>Azan:</label>
                            <input type="time" class="edit-azan" value="${p.azan}">
                            <label>Jamat:</label>
                            <input type="time" class="edit-jamat" value="${p.jamat}">
                        </div>
                    `;
                });

                document.getElementById('adminPanel').style.display = 'flex';
            } else if (userPin !== null) {
                alert("Incorrect PIN Code Access Denied.");
            }
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function saveAdminSettings() {
            currentNotice = document.getElementById('inputNotice').value;
            localStorage.setItem('masjidNotice', currentNotice);
            document.getElementById('banner-view').innerHTML = `<span>WELCOME:</span> ${currentNotice}`;

            hijriOffset = parseInt(document.getElementById('hijriOffset').value);
            localStorage.setItem('masjidHijriOffset', hijriOffset);

            let rows = document.querySelectorAll('.prayer-row');
            rows.forEach(row => {
                let idx = row.getAttribute('data-idx');
                completeSchedule[idx].azan = row.querySelector('.edit-azan').value;
                completeSchedule[idx].jamat = row.querySelector('.edit-jamat').value;
            });
            localStorage.setItem('masjidSchedule', JSON.stringify(completeSchedule));

            alert("Settings successfully saved and synchronized!");
            closeAdminPanel();
            updateDisplay();
        }

        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>
