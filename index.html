<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vakola Jumma Masjid - Digital Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #031c12; /* Premium ultra-dark green background */
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            position: relative;
        }

        /* Header Section */
        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .location {
            font-size: 1.3rem;
            color: #a3b899;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .welcome-banner {
            background-color: #0d422a;
            border: 1px solid #1c633f;
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
            max-width: 90%;
        }

        .welcome-banner span {
            color: #4ade80; /* Light neon green accents */
        }

        /* Hidden/Subtle Settings Trigger Gear */
        .settings-trigger {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.15; /* Keeps it nearly invisible to common viewers */
            transition: opacity 0.3s;
        }
        .settings-trigger:hover {
            opacity: 0.8;
        }
        .settings-trigger svg {
            fill: #ffffff;
            width: 32px;
            height: 32px;
        }

        /* Main Hero Card Container */
        .hero-card {
            background: linear-gradient(145deg, #093b22, #062b19);
            border: 2px solid #144e31;
            border-radius: 40px;
            flex-grow: 1;
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0px 0px 30px rgba(0,0,0,0.4), 0px 20px 40px rgba(0,0,0,0.5);
            padding: 40px;
        }

        .next-jamat-tag {
            background-color: #17422f;
            border: 1px solid #235c42;
            padding: 12px 35px;
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .countdown-timer {
            font-size: 7.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .scheduled-time {
            font-size: 2rem;
            color: #a3c4b4;
            font-weight: 600;
        }

        /* Bottom Status Bar */
        .bottom-bar {
            background-color: #083821;
            border: 1px solid #124d30;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
            width: 100%;
        }

        .bar-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .bar-segment:not(:last-child) {
            border-right: 1px solid #124d30;
        }

        .bar-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #5bb384;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .bar-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
        }

        .bar-subtext {
            font-size: 0.9rem;
            color: #eab308; /* Premium Gold tone */
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* Overlay Admin Panel Modal Styling */
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(2, 14, 9, 0.95);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .admin-box {
            background: #092e1b;
            border: 2px solid #1e5a38;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .admin-box h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e5a38;
            padding-bottom: 10px;
            color: #4ade80;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #a3c4b4;
        }

        .prayer-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }

        .prayer-row span {
            width: 80px;
            font-weight: 700;
        }

        .admin-box input[type="text"],
        .admin-box input[type="time"] {
            background: #04170e;
            border: 1px solid #1a472c;
            color: #ffffff;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
        }

        .prayer-row input[type="time"] {
            flex: 1;
        }

        .admin-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .btn-save {
            background: #4ade80;
            color: #031c12;
        }

        .btn-cancel {
            background: #334155;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Vakola Jumma Masjid</h1>
        <div class="location">Santacruz East, Mumbai</div>
        
        <div class="welcome-banner" id="banner-view">
            <span>WELCOME:</span> FRIDAY KHUTBAH BEGINS AT 1:15 PM.
        </div>

        <!-- Hidden Settings Button -->
        <button class="settings-trigger" onclick="openAdminPanel()" aria-label="Open Settings">
            <svg viewBox="0 0 24 24">
                <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
            </svg>
        </button>
    </header>

    <!-- Main Dynamic View Card -->
    <main class="hero-card">
        <div class="next-jamat-tag" id="jamat-tag">NEXT JAMAT: LOADING</div>
        <div class="countdown-timer" id="countdown">00:00:00</div>
        <div class="scheduled-time" id="scheduled">Scheduled for --:-- --</div>
    </main>

    <!-- Bottom Status Bar -->
    <footer class="bottom-bar">
        <div class="bar-segment">
            <div class="bar-label" id="current-prayer-label">Current Prayer</div>
            <div class="bar-value" id="current-prayer-time">--:-- --</div>
        </div>
        <div class="bar-segment">
            <div class="bar-label">Next Azan: <span style="color:#fff;" id="next-azan-time">--:-- --</span></div>
            <div class="bar-subtext" id="next-azan-label">Loading</div>
        </div>
        <div class="bar-segment">
            <div class="bar-label">Next Azan After</div>
            <div class="bar-value" id="next-azan-after-time" style="color:#eab308;">--:-- --</div>
        </div>
    </footer>

    <!-- Hidden Admin Settings Overlay Modal Panel -->
    <div class="admin-overlay" id="adminPanel">
        <div class="admin-box">
            <h2>Masjid Admin Control Panel</h2>
            
            <div class="form-group">
                <label for="inputNotice">Notice Banner Text</label>
                <input type="text" id="inputNotice" value="FRIDAY KHUTBAH BEGINS AT 1:15 PM.">
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label style="color: #4ade80; border-bottom: 1px solid #1a472c; padding-bottom: 5px; margin-bottom: 10px;">Edit Namaz Schedules (24hr Format)</label>
                
                <div id="prayerFormRows">
                    <!-- JavaScript dynamically inserts rows here -->
                </div>
            </div>

            <div class="admin-actions">
                <button class="btn btn-cancel" onclick="closeAdminPanel()">Cancel</button>
                <button class="btn btn-save" onclick="saveAdminSettings()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Default configuration values
        const DEFAULT_NOTICE = "FRIDAY KHUTBAH BEGINS AT 1:15 PM.";
        const DEFAULT_SCHEDULE = [
            { name: 'Fajr',    azan: '04:40', jamat: '05:10' },
            { name: 'Jummah',  azan: '12:35', jamat: '13:15' }, 
            { name: 'Asr',     azan: '17:05', jamat: '17:30' }, 
            { name: 'Maghrib', azan: '19:15', jamat: '19:20' }, 
            { name: 'Isha',    azan: '20:45', jamat: '21:00' }  
        ];
        const ADMIN_PIN = "1234"; // You can change this secret pin to whatever you want

        // Initialize state parameters from localStorage data caches
        let currentNotice = localStorage.getItem('masjidNotice') || DEFAULT_NOTICE;
        let prayerSchedule = JSON.parse(localStorage.getItem('masjidSchedule')) || DEFAULT_SCHEDULE;

        // Apply active notice string directly to presentation template
        document.getElementById('banner-view').innerHTML = `<span>WELCOME:</span> ${currentNotice}`;

        // Helper to cleanly convert '17:30' into '05:30 PM'
        function format12Hour(timeString) {
            let [hrs, mins] = timeString.split(':').map(Number);
            let ampm = hrs >= 12 ? 'PM' : 'AM';
            hrs = hrs % 12 || 12;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')} ${ampm}`;
        }

        function updateDisplay() {
            const now = new Date();
            let nextPrayerIndex = -1;
            let currentPrayerIndex = -1;

            for (let i = 0; i < prayerSchedule.length; i++) {
                let [jamatHrs, jamatMins] = prayerSchedule[i].jamat.split(':').map(Number);
                let jamatTime = new Date();
                jamatTime.setHours(jamatHrs, jamatMins, 0, 0);

                if (now < jamatTime) {
                    nextPrayerIndex = i;
                    break;
                }
            }

            if (nextPrayerIndex === -1) {
                nextPrayerIndex = 0;
                currentPrayerIndex = prayerSchedule.length - 1;
            } else {
                currentPrayerIndex = nextPrayerIndex === 0 ? prayerSchedule.length - 1 : nextPrayerIndex - 1;
            }

            let nextPrayer = prayerSchedule[nextPrayerIndex];
            let currentPrayer = prayerSchedule[currentPrayerIndex];

            let [targetHrs, targetMins] = nextPrayer.jamat.split(':').map(Number);
            let targetDate = new Date();
            targetDate.setHours(targetHrs, targetMins, 0, 0);

            if (now > targetDate) {
                targetDate.setDate(targetDate.getDate() + 1);
            }

            let diffMs = targetDate - now;
            let diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
            let diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            let diffSecs = Math.floor((diffMs % (1000 * 60)) / 1000);

            let countdownStr = 
                `${String(diffHrs).padStart(2, '0')}:${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;

            document.getElementById('jamat-tag').innerText = `NEXT JAMAT: ${nextPrayer.name}`;
            document.getElementById('countdown').innerText = countdownStr;
            document.getElementById('scheduled').innerText = `Scheduled for ${format12Hour(nextPrayer.jamat)}`;
            
            document.getElementById('current-prayer-label').innerText = currentPrayer.name;
            document.getElementById('current-prayer-time').innerText = format12Hour(currentPrayer.jamat);
            
            document.getElementById('next-azan-time').innerText = format12Hour(nextPrayer.azan);
            document.getElementById('next-azan-label').innerText = nextPrayer.name;
            document.getElementById('next-azan-after-time').innerText = format12Hour(nextPrayer.jamat);
        }

        /* ADMIN PANEL FUNCTIONALITIES */
        function openAdminPanel() {
            let userPin = prompt("Enter Admin Security PIN to access settings:");
            if (userPin === ADMIN_PIN) {
                // Populate input fields before showing panel
                document.getElementById('inputNotice').value = currentNotice;
                
                let container = document.getElementById('prayerFormRows');
                container.innerHTML = ""; // Reset
                
                prayerSchedule.forEach((p, idx) => {
                    container.innerHTML += `
                        <div class="prayer-row" data-idx="${idx}">
                            <span>${p.name}</span>
                            <label>Azan:</label>
                            <input type="time" class="edit-azan" value="${p.azan}">
                            <label>Jamat:</label>
                            <input type="time" class="edit-jamat" value="${p.jamat}">
                        </div>
                    `;
                });

                document.getElementById('adminPanel').style.display = 'flex';
            } else if (userPin !== null) {
                alert("Incorrect PIN Code Access Denied.");
            }
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function saveAdminSettings() {
            // 1. Save Notice Text updates
            currentNotice = document.getElementById('inputNotice').value;
            localStorage.setItem('masjidNotice', currentNotice);
            document.getElementById('banner-view').innerHTML = `<span>WELCOME:</span> ${currentNotice}`;

            // 2. Save Timings array updates
            let rows = document.querySelectorAll('.prayer-row');
            rows.forEach(row => {
                let idx = row.getAttribute('data-idx');
                prayerSchedule[idx].azan = row.querySelector('.edit-azan').value;
                prayerSchedule[idx].jamat = row.querySelector('.edit-jamat').value;
            });
            localStorage.setItem('masjidSchedule', JSON.stringify(prayerSchedule));

            alert("Settings successfully saved and synchronized!");
            closeAdminPanel();
            updateDisplay();
        }

        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>
